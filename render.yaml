services:
  - type: web
    name: smartfoot-retail
    env: node
    region: singapore
    plan: free
    buildCommand: |
      npm install --prefix backend
      npm install --prefix frontend
      npm run build --prefix frontend
    startCommand: node backend/src/server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5000
      - key: JWT_SECRET
        generateValue: true
      - key: DB_PATH
        value: /var/data/smartfoot.db
    disk:
      name: smartfoot-data
      mountPath: /var/data
      sizeGB: 1
